name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 본인의 메인 브랜치 이름 확인 (main 또는 master)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🌟 1. pnpm 설치
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.5.2 # 현재 프로젝트에서 사용하는 pnpm 버전

      # 🌟 2. Node.js 설정 및 pnpm 캐시 활성화
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 🌟 3. pnpm으로 의존성 설치
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 🌟 4. pnpm으로 프로젝트 빌드
      - name: Build
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4